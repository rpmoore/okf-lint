name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify release tag matches Cargo.toml version
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$RELEASE_TAG" != "v$cargo_version" ]; then
            echo "::error::release tag '$RELEASE_TAG' does not match Cargo.toml version 'v$cargo_version' — bump Cargo.toml and merge before tagging"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked --verbose

      - name: Test
        run: cargo test --release --locked --verbose

      - name: Dry-run crates.io publish
        run: cargo publish --dry-run --locked

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            rpmoore/okf-lint:${{ github.sha }}
            rpmoore/okf-lint:latest

      - name: Smoke-test Docker image (linux/amd64)
        run: |
          docker run --rm --platform linux/amd64 "rpmoore/okf-lint:${{ github.sha }}" --help
          docker run --rm --platform linux/amd64 "rpmoore/okf-lint:${{ github.sha }}" version | grep -qF "commit: ${{ github.sha }}"

      - name: Build Docker image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            rpmoore/okf-lint:${{ github.sha }}
            rpmoore/okf-lint:latest

      - name: Smoke-test Docker image (linux/arm64)
        run: |
          docker run --rm --platform linux/arm64 "rpmoore/okf-lint:${{ github.sha }}" --help
          docker run --rm --platform linux/arm64 "rpmoore/okf-lint:${{ github.sha }}" version | grep -qF "commit: ${{ github.sha }}"

      # Everything above this point is validation only — nothing has been
      # pushed or published yet. Only push/publish once all of it passes.

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rpmoore
          password: ${{ secrets.DOCKERHUB_PUSH }}

      - name: Build and push Docker image (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            rpmoore/okf-lint:${{ github.sha }}
            rpmoore/okf-lint:latest

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
        run: cargo publish --locked
